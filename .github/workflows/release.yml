name: release

# Build wheels for all platforms and publish to PyPI via Trusted Publishing
# (OIDC — no API token stored). Fires on a version tag push.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      # Independent targets — don't let aarch64 (QEMU) cancel a healthy x86_64.
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # manylinux_2_28 (AlmaLinux) covers our aarch64 prod (glibc 2.39).
          manylinux: "2_28"
          # Run inside the crate dir so `--out dist` resolves to the same place
          # (crates/webpush-rs/dist) on every backend. With `-m manifest-path`
          # under the native-docker x86_64 build, `dist` landed inside the
          # container and the upload found nothing; working-directory avoids that.
          working-directory: crates/webpush-rs
          # Vendored OpenSSL 3.x's Configure needs the perl IPC::Cmd module,
          # which the base image lacks ('Can't locate IPC/Cmd.pm'). The package
          # manager differs across the per-arch images (x86_64 has dnf; some
          # aarch64 images only have microdnf or yum) — try each, never fail the
          # step on a missing manager.
          before-script-linux: |
            command -v dnf && dnf install -y perl-IPC-Cmd && exit 0
            command -v microdnf && microdnf install -y perl-IPC-Cmd && exit 0
            command -v yum && yum install -y perl-IPC-Cmd && exit 0
            true
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/webpush-rs/dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: crates/webpush-rs
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/webpush-rs/dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/webpush-rs
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: crates/webpush-rs/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: crates/webpush-rs
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/webpush-rs/dist

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    # Only publish on an actual tag push, not manual dispatch dry-runs.
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/webpush-rs
    permissions:
      # OIDC token for Trusted Publishing — this is what replaces an API token.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
