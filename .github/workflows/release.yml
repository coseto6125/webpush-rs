name: release

# Build wheels for all platforms and publish to PyPI via Trusted Publishing
# (OIDC — no API token stored). Fires on a version tag push.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          # manylinux_2_28, not 2014: vendored OpenSSL needs a perl new enough to
          # configure OpenSSL 3.x from source, which the 2014 image's perl is too
          # old for ('perl reported failure exit status 2'). 2_28 still covers our
          # aarch64 prod (glibc 2.39) and any reasonably modern Linux.
          manylinux: "2_28"
          args: --release --out dist -m crates/webpush-rs/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m crates/webpush-rs/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -m crates/webpush-rs/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/webpush-rs/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    # Only publish on an actual tag push, not manual dispatch dry-runs.
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/webpush-rs
    permissions:
      # OIDC token for Trusted Publishing — this is what replaces an API token.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
